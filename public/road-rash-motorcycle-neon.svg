<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1a0a"/>
      <stop offset="100%" style="stop-color:#001a00"/>
    </linearGradient>
    <linearGradient id="road" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#333"/>
      <stop offset="100%" style="stop-color:#555"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <!-- Road -->
  <polygon points="250,600 550,600 480,250 320,250" fill="url(#road)"/>
  <line x1="400" y1="250" x2="400" y2="600" stroke="#ffcc00" stroke-width="2" stroke-dasharray="20,15" opacity="0.7"/>
  <!-- Road edges -->
  <line x1="320" y1="250" x2="250" y2="600" stroke="#ff2200" stroke-width="3" filter="url(#glow)"/>
  <line x1="480" y1="250" x2="550" y2="600" stroke="#ff2200" stroke-width="3" filter="url(#glow)"/>
  <!-- Motorcycle body -->
  <ellipse cx="400" cy="450" rx="35" ry="15" fill="#cc0000" filter="url(#glow)"/>
  <!-- Wheels -->
  <circle cx="370" cy="480" r="22" fill="none" stroke="#44ff44" stroke-width="3" filter="url(#glow)"/>
  <circle cx="430" cy="480" r="22" fill="none" stroke="#44ff44" stroke-width="3" filter="url(#glow)"/>
  <!-- Rider -->
  <ellipse cx="400" cy="420" rx="12" ry="20" fill="#222"/>
  <circle cx="400" cy="395" r="12" fill="#ffcc88"/>
  <!-- Fist -->
  <circle cx="435" cy="415" r="8" fill="#ff4422" filter="url(#glow)"/>
  <text x="435" y="400" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#ffcc00" filter="url(#glow)">POW!</text>
  <!-- Speed lines -->
  <line x1="340" y1="500" x2="300" y2="580" stroke="#44ff44" stroke-width="2" opacity="0.5"/>
  <line x1="360" y1="490" x2="310" y2="570" stroke="#44ff44" stroke-width="2" opacity="0.4"/>
  <line x1="460" y1="500" x2="500" y2="580" stroke="#44ff44" stroke-width="2" opacity="0.5"/>
  <line x1="440" y1="490" x2="490" y2="570" stroke="#44ff44" stroke-width="2" opacity="0.4"/>
  <!-- Title -->
  <text x="400" y="200" text-anchor="middle" font-family="monospace" font-size="48" font-weight="bold" fill="#ff4422" filter="url(#glow)">ROAD RASH</text>
  <text x="400" y="230" text-anchor="middle" font-family="monospace" font-size="16" fill="#44ff44" filter="url(#glow)">RACE • FIGHT • WIN</text>
</svg>
