<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#0d0d0d"/>
  <!-- Grid lines -->
  <line x1="200" y1="20" x2="200" y2="280" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="20" y1="150" x2="380" y2="150" stroke="#1a1a1a" stroke-width="2"/>
  <!-- + sign -->
  <rect x="70" y="55" width="50" height="8" rx="2" fill="#2ecc71" opacity="0.8"/>
  <rect x="91" y="35" width="8" height="48" rx="2" fill="#2ecc71" opacity="0.8"/>
  <!-- − sign -->
  <rect x="270" y="55" width="50" height="8" rx="2" fill="#e74c3c" opacity="0.8"/>
  <!-- × sign -->
  <rect x="68" y="200" width="55" height="8" rx="2" fill="#3498db" opacity="0.8" transform="rotate(45 95 204)"/>
  <rect x="68" y="200" width="55" height="8" rx="2" fill="#3498db" opacity="0.8" transform="rotate(-45 95 204)"/>
  <!-- ÷ sign -->
  <rect x="270" y="200" width="50" height="8" rx="2" fill="#9b59b6" opacity="0.8"/>
  <circle cx="295" cy="186" r="6" fill="#9b59b6" opacity="0.8"/>
  <circle cx="295" cy="222" r="6" fill="#9b59b6" opacity="0.8"/>
  <!-- Numbers scattered -->
  <text x="50" y="140" font-family="Courier New, monospace" font-size="18" fill="#333" font-weight="bold">7</text>
  <text x="150" y="100" font-family="Courier New, monospace" font-size="24" fill="#333" font-weight="bold">42</text>
  <text x="310" y="140" font-family="Courier New, monospace" font-size="16" fill="#333" font-weight="bold">13</text>
  <text x="240" y="270" font-family="Courier New, monospace" font-size="20" fill="#333" font-weight="bold">8</text>
  <text x="130" y="250" font-family="Courier New, monospace" font-size="14" fill="#333" font-weight="bold">27</text>
  <!-- Question mark -->
  <text x="170" y="170" font-family="Courier New, monospace" font-size="48" fill="#f1c40f" font-weight="bold" opacity="0.6">?</text>
  <!-- Timer bar -->
  <rect x="40" y="280" width="320" height="4" rx="2" fill="#1a1a1a"/>
  <rect x="40" y="280" width="220" height="4" rx="2" fill="#2ecc71" opacity="0.7"/>
  <!-- Brain emoji as circle -->
  <text x="175" y="30" font-family="sans-serif" font-size="20">🧠</text>
</svg>
