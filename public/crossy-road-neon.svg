<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a2e"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </linearGradient>
    <linearGradient id="player" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00f0ff"/>
      <stop offset="100%" stop-color="#006688"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="lineGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="url(#bg)"/>

  <!-- === Lane 1: Safe grass (bottom) === -->
  <rect x="0" y="240" width="400" height="60" fill="#0d1a0d"/>
  <!-- Grass dots -->
  <circle cx="20" cy="260" r="1.5" fill="#39ff14" opacity="0.15"/>
  <circle cx="55" cy="272" r="1.5" fill="#39ff14" opacity="0.12"/>
  <circle cx="100" cy="255" r="1.5" fill="#39ff14" opacity="0.15"/>
  <circle cx="150" cy="268" r="1.5" fill="#39ff14" opacity="0.1"/>
  <circle cx="210" cy="258" r="1.5" fill="#39ff14" opacity="0.15"/>
  <circle cx="270" cy="275" r="1.5" fill="#39ff14" opacity="0.12"/>
  <circle cx="330" cy="252" r="1.5" fill="#39ff14" opacity="0.15"/>
  <circle cx="370" cy="270" r="1.5" fill="#39ff14" opacity="0.1"/>

  <!-- === Lane 2: Road === -->
  <rect x="0" y="200" width="400" height="40" fill="#121218"/>
  <!-- Lane marking -->
  <line x1="0" y1="220" x2="400" y2="220" stroke="rgba(255,255,255,0.06)" stroke-width="1" stroke-dasharray="12 12"/>
  
  <!-- Car 1 (pink, going right) -->
  <rect x="60" y="205" width="60" height="30" rx="4" fill="#ff2d7b" filter="url(#glow)"/>
  <rect x="60" y="205" width="60" height="30" rx="4" fill="url(#bg)" opacity="0.1"/>
  <!-- Headlights -->
  <circle cx="116" cy="212" r="2.5" fill="#ffffff" filter="url(#glow)"/>
  <circle cx="116" cy="228" r="2.5" fill="#ffffff" filter="url(#glow)"/>
  <!-- Taillights -->
  <circle cx="64" cy="212" r="2" fill="#ff2d7b" filter="url(#glow)"/>
  <circle cx="64" cy="228" r="2" fill="#ff2d7b" filter="url(#glow)"/>
  
  <!-- Car 2 (orange, going right) -->
  <rect x="260" y="205" width="50" height="30" rx="4" fill="#ff8800" filter="url(#glow)"/>
  <!-- Headlights -->
  <circle cx="306" cy="212" r="2.5" fill="#ffffff" filter="url(#glow)"/>
  <circle cx="306" cy="228" r="2.5" fill="#ffffff" filter="url(#glow)"/>
  <!-- Taillights -->
  <circle cx="264" cy="212" r="2" fill="#ff2d7b" filter="url(#glow)"/>
  <circle cx="264" cy="228" r="2" fill="#ff2d7b" filter="url(#glow)"/>

  <!-- === Lane 3: Road === -->
  <rect x="0" y="160" width="400" height="40" fill="#121218"/>
  <line x1="0" y1="180" x2="400" y2="180" stroke="rgba(255,255,255,0.06)" stroke-width="1" stroke-dasharray="12 12"/>
  
  <!-- Car 3 (purple, going left) -->
  <rect x="140" y="165" width="55" height="30" rx="4" fill="#aa44ff" filter="url(#glow)"/>
  <circle cx="144" cy="172" r="2.5" fill="#ffffff" filter="url(#glow)"/>
  <circle cx="144" cy="188" r="2.5" fill="#ffffff" filter="url(#glow)"/>
  <circle cx="191" cy="172" r="2" fill="#ff2d7b" filter="url(#glow)"/>
  <circle cx="191" cy="188" r="2" fill="#ff2d7b" filter="url(#glow)"/>
  
  <!-- Car 4 (yellow) -->
  <rect x="320" y="165" width="45" height="30" rx="4" fill="#ffe600" filter="url(#glow)"/>
  <circle cx="324" cy="172" r="2.5" fill="#ffffff" filter="url(#glow)"/>
  <circle cx="324" cy="188" r="2.5" fill="#ffffff" filter="url(#glow)"/>

  <!-- === Lane 4: Safe grass === -->
  <rect x="0" y="120" width="400" height="40" fill="#0d1a0d"/>
  <circle cx="40" cy="135" r="1.5" fill="#39ff14" opacity="0.15"/>
  <circle cx="120" cy="145" r="1.5" fill="#39ff14" opacity="0.12"/>
  <circle cx="200" cy="130" r="1.5" fill="#39ff14" opacity="0.15"/>
  <circle cx="300" cy="148" r="1.5" fill="#39ff14" opacity="0.1"/>
  <circle cx="370" cy="133" r="1.5" fill="#39ff14" opacity="0.14"/>

  <!-- === Lane 5: River === -->
  <rect x="0" y="80" width="400" height="40" fill="#061828"/>
  <!-- Water shimmer -->
  <rect x="15" y="98" width="8" height="1.5" fill="#00f0ff" opacity="0.08"/>
  <rect x="45" y="102" width="8" height="1.5" fill="#00f0ff" opacity="0.06"/>
  <rect x="130" y="96" width="8" height="1.5" fill="#00f0ff" opacity="0.08"/>
  <rect x="240" y="100" width="8" height="1.5" fill="#00f0ff" opacity="0.06"/>
  <rect x="330" y="95" width="8" height="1.5" fill="#00f0ff" opacity="0.08"/>
  
  <!-- Log 1 -->
  <rect x="30" y="86" width="75" height="28" rx="5" fill="#00aa44" filter="url(#glow)"/>
  <line x1="50" y1="90" x2="50" y2="110" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="65" y1="90" x2="65" y2="110" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="80" y1="90" x2="80" y2="110" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  
  <!-- Log 2 -->
  <rect x="200" y="86" width="90" height="28" rx="5" fill="#336655" filter="url(#glow)"/>
  <line x1="220" y1="90" x2="220" y2="110" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="240" y1="90" x2="240" y2="110" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="260" y1="90" x2="260" y2="110" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- === Lane 6: Road === -->
  <rect x="0" y="40" width="400" height="40" fill="#121218"/>
  <line x1="0" y1="60" x2="400" y2="60" stroke="rgba(255,255,255,0.06)" stroke-width="1" stroke-dasharray="12 12"/>
  
  <!-- Car 5 (blue) -->
  <rect x="80" y="45" width="65" height="30" rx="4" fill="#1a8cff" filter="url(#glow)"/>
  <circle cx="141" cy="52" r="2.5" fill="#ffffff" filter="url(#glow)"/>
  <circle cx="141" cy="68" r="2.5" fill="#ffffff" filter="url(#glow)"/>
  <circle cx="84" cy="52" r="2" fill="#ff2d7b" filter="url(#glow)"/>
  <circle cx="84" cy="68" r="2" fill="#ff2d7b" filter="url(#glow)"/>

  <!-- Top area -->
  <rect x="0" y="0" width="400" height="40" fill="#0d1a0d"/>
  <circle cx="60" cy="18" r="1.5" fill="#39ff14" opacity="0.12"/>
  <circle cx="180" cy="25" r="1.5" fill="#39ff14" opacity="0.15"/>
  <circle cx="340" cy="15" r="1.5" fill="#39ff14" opacity="0.1"/>

  <!-- === PLAYER (on safe lane) === -->
  <!-- Shadow -->
  <ellipse cx="200" cy="153" rx="13" ry="4" fill="rgba(0,0,0,0.3)"/>
  <!-- Body -->
  <rect x="185" y="125" width="30" height="30" rx="6" fill="url(#player)" filter="url(#glowStrong)"/>
  <!-- Eyes -->
  <circle cx="195" cy="136" r="3" fill="#ffffff" filter="url(#glow)"/>
  <circle cx="205" cy="136" r="3" fill="#ffffff" filter="url(#glow)"/>
  <circle cx="195.5" cy="136.5" r="1.5" fill="#000000"/>
  <circle cx="205.5" cy="136.5" r="1.5" fill="#000000"/>

  <!-- Neon borders -->
  <line x1="1" y1="0" x2="1" y2="150" stroke="#ff1a1a" stroke-width="3" opacity="0.5" filter="url(#lineGlow)"/>
  <line x1="1" y1="150" x2="1" y2="300" stroke="#1a8cff" stroke-width="3" opacity="0.5" filter="url(#lineGlow)"/>
  <line x1="399" y1="0" x2="399" y2="150" stroke="#ffe600" stroke-width="3" opacity="0.5" filter="url(#lineGlow)"/>
  <line x1="399" y1="150" x2="399" y2="300" stroke="#00ff66" stroke-width="3" opacity="0.5" filter="url(#lineGlow)"/>

  <!-- Corner glows -->
  <circle cx="2" cy="2" r="4" fill="#ff1a1a" opacity="0.5" filter="url(#glow)"/>
  <circle cx="398" cy="2" r="4" fill="#ffe600" opacity="0.5" filter="url(#glow)"/>
  <circle cx="2" cy="298" r="4" fill="#1a8cff" opacity="0.5" filter="url(#glow)"/>
  <circle cx="398" cy="298" r="4" fill="#00ff66" opacity="0.5" filter="url(#glow)"/>

  <!-- Hop particles near player -->
  <circle cx="195" cy="158" r="2" fill="#00f0ff" opacity="0.2"/>
  <circle cx="208" cy="155" r="1.5" fill="#00f0ff" opacity="0.15"/>
  <circle cx="192" cy="160" r="1" fill="#00f0ff" opacity="0.12"/>
</svg>
