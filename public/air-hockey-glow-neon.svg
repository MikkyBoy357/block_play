<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a2e"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </linearGradient>
    <radialGradient id="rinkGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="rgba(0,255,200,0.08)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>
    <linearGradient id="puck" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00ffcc"/>
      <stop offset="100%" stop-color="#00aa88"/>
    </linearGradient>
    <linearGradient id="paddle1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff4488"/>
      <stop offset="100%" stop-color="#cc1155"/>
    </linearGradient>
    <linearGradient id="paddle2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4488ff"/>
      <stop offset="100%" stop-color="#1155cc"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="puckGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="lineGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g stroke="rgba(255,255,255,0.03)" stroke-width="0.5">
    <line x1="50" y1="0" x2="50" y2="300"/><line x1="100" y1="0" x2="100" y2="300"/>
    <line x1="150" y1="0" x2="150" y2="300"/><line x1="200" y1="0" x2="200" y2="300"/>
    <line x1="250" y1="0" x2="250" y2="300"/><line x1="300" y1="0" x2="300" y2="300"/>
    <line x1="350" y1="0" x2="350" y2="300"/>
    <line x1="0" y1="50" x2="400" y2="50"/><line x1="0" y1="100" x2="400" y2="100"/>
    <line x1="0" y1="150" x2="400" y2="150"/><line x1="0" y1="200" x2="400" y2="200"/>
    <line x1="0" y1="250" x2="400" y2="250"/>
  </g>

  <!-- Rink glow -->
  <rect x="40" y="30" width="320" height="240" rx="20" fill="url(#rinkGlow)"/>

  <!-- Rink border -->
  <rect x="40" y="30" width="320" height="240" rx="20" fill="none" stroke="#00ffcc" stroke-width="1.5" opacity="0.4" filter="url(#lineGlow)"/>

  <!-- Center line -->
  <line x1="200" y1="30" x2="200" y2="270" stroke="#00ffcc" stroke-width="1" opacity="0.3" stroke-dasharray="6 4" filter="url(#lineGlow)"/>

  <!-- Center circle -->
  <circle cx="200" cy="150" r="40" fill="none" stroke="#00ffcc" stroke-width="1" opacity="0.3" filter="url(#lineGlow)"/>
  <circle cx="200" cy="150" r="3" fill="#00ffcc" opacity="0.4"/>

  <!-- Goal areas -->
  <rect x="40" y="100" width="8" height="100" rx="2" fill="none" stroke="#ff4488" stroke-width="1" opacity="0.5" filter="url(#lineGlow)"/>
  <rect x="352" y="100" width="8" height="100" rx="2" fill="none" stroke="#4488ff" stroke-width="1" opacity="0.5" filter="url(#lineGlow)"/>

  <!-- Paddle 1 (left, pink) -->
  <circle cx="110" cy="140" r="20" fill="url(#paddle1)" opacity="0.9" filter="url(#glow)"/>
  <circle cx="110" cy="140" r="20" fill="none" stroke="#ff88bb" stroke-width="1.5" opacity="0.6"/>
  <circle cx="110" cy="140" r="8" fill="none" stroke="#ff88bb" stroke-width="1" opacity="0.4"/>

  <!-- Paddle 2 (right, blue) -->
  <circle cx="290" cy="170" r="20" fill="url(#paddle2)" opacity="0.9" filter="url(#glow)"/>
  <circle cx="290" cy="170" r="20" fill="none" stroke="#88bbff" stroke-width="1.5" opacity="0.6"/>
  <circle cx="290" cy="170" r="8" fill="none" stroke="#88bbff" stroke-width="1" opacity="0.4"/>

  <!-- Puck -->
  <circle cx="185" cy="130" r="10" fill="url(#puck)" filter="url(#puckGlow)"/>
  <circle cx="185" cy="130" r="10" fill="none" stroke="#88ffee" stroke-width="1" opacity="0.8"/>

  <!-- Puck trail -->
  <line x1="220" y1="155" x2="190" y2="132" stroke="#00ffcc" stroke-width="1.5" opacity="0.15"/>
  <line x1="235" y1="168" x2="220" y2="155" stroke="#00ffcc" stroke-width="1" opacity="0.08"/>

  <!-- Score indicators -->
  <text x="160" y="22" fill="#ff4488" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle" opacity="0.7" filter="url(#lineGlow)">3</text>
  <text x="200" y="22" fill="rgba(255,255,255,0.3)" font-family="monospace" font-size="10" text-anchor="middle">-</text>
  <text x="240" y="22" fill="#4488ff" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle" opacity="0.7" filter="url(#lineGlow)">2</text>

  <!-- Corner accents -->
  <circle cx="55" cy="45" r="2" fill="#00ffcc" opacity="0.3"/>
  <circle cx="345" cy="45" r="2" fill="#00ffcc" opacity="0.3"/>
  <circle cx="55" cy="255" r="2" fill="#00ffcc" opacity="0.3"/>
  <circle cx="345" cy="255" r="2" fill="#00ffcc" opacity="0.3"/>

  <!-- Ambient particles -->
  <circle cx="80" cy="80" r="1" fill="#00ffcc" opacity="0.2"/>
  <circle cx="320" cy="220" r="1" fill="#00ffcc" opacity="0.2"/>
  <circle cx="150" cy="240" r="1.5" fill="#ff4488" opacity="0.15"/>
  <circle cx="260" cy="60" r="1.5" fill="#4488ff" opacity="0.15"/>
</svg>
