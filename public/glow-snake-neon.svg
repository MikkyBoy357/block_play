<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a2e"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </linearGradient>
    <linearGradient id="snakeHead" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00f0ff"/>
      <stop offset="100%" stop-color="#0099ff"/>
    </linearGradient>
    <linearGradient id="snakeBody1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00ccff"/>
      <stop offset="100%" stop-color="#0066ff"/>
    </linearGradient>
    <linearGradient id="snakeBody2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6622ff"/>
      <stop offset="100%" stop-color="#9900ff"/>
    </linearGradient>
    <linearGradient id="snakeBody3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#cc00ff"/>
      <stop offset="100%" stop-color="#ff0099"/>
    </linearGradient>
    <linearGradient id="food" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#39ff14"/>
      <stop offset="100%" stop-color="#00aa00"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="foodGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="lineGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g stroke="rgba(255,255,255,0.03)" stroke-width="0.5">
    <line x1="20" y1="0" x2="20" y2="300"/><line x1="40" y1="0" x2="40" y2="300"/>
    <line x1="60" y1="0" x2="60" y2="300"/><line x1="80" y1="0" x2="80" y2="300"/>
    <line x1="100" y1="0" x2="100" y2="300"/><line x1="120" y1="0" x2="120" y2="300"/>
    <line x1="140" y1="0" x2="140" y2="300"/><line x1="160" y1="0" x2="160" y2="300"/>
    <line x1="180" y1="0" x2="180" y2="300"/><line x1="200" y1="0" x2="200" y2="300"/>
    <line x1="220" y1="0" x2="220" y2="300"/><line x1="240" y1="0" x2="240" y2="300"/>
    <line x1="260" y1="0" x2="260" y2="300"/><line x1="280" y1="0" x2="280" y2="300"/>
    <line x1="300" y1="0" x2="300" y2="300"/><line x1="320" y1="0" x2="320" y2="300"/>
    <line x1="340" y1="0" x2="340" y2="300"/><line x1="360" y1="0" x2="360" y2="300"/>
    <line x1="380" y1="0" x2="380" y2="300"/>
    <line x1="0" y1="20" x2="400" y2="20"/><line x1="0" y1="40" x2="400" y2="40"/>
    <line x1="0" y1="60" x2="400" y2="60"/><line x1="0" y1="80" x2="400" y2="80"/>
    <line x1="0" y1="100" x2="400" y2="100"/><line x1="0" y1="120" x2="400" y2="120"/>
    <line x1="0" y1="140" x2="400" y2="140"/><line x1="0" y1="160" x2="400" y2="160"/>
    <line x1="0" y1="180" x2="400" y2="180"/><line x1="0" y1="200" x2="400" y2="200"/>
        <line x1="0" y1="220" x2="400" y2="220"/><line x1="0" y1="240" x2="400" y2="240"/>
    <line x1="0" y1="260" x2="400" y2="260"/><line x1="0" y1="280" x2="400" y2="280"/>
  </g>

  <!-- Neon border with quadrant colors -->
  <!-- Left: red top, blue bottom -->
  <line x1="2" y1="0" x2="2" y2="150" stroke="#ff1a1a" stroke-width="3" opacity="0.6" filter="url(#lineGlow)"/>
  <line x1="2" y1="150" x2="2" y2="300" stroke="#1a8cff" stroke-width="3" opacity="0.6" filter="url(#lineGlow)"/>
  <!-- Right: yellow top, green bottom -->
  <line x1="398" y1="0" x2="398" y2="150" stroke="#ffe600" stroke-width="3" opacity="0.6" filter="url(#lineGlow)"/>
  <line x1="398" y1="150" x2="398" y2="300" stroke="#00ff66" stroke-width="3" opacity="0.6" filter="url(#lineGlow)"/>
  <!-- Top: red left, yellow right -->
  <line x1="0" y1="2" x2="200" y2="2" stroke="#ff1a1a" stroke-width="3" opacity="0.6" filter="url(#lineGlow)"/>
  <line x1="200" y1="2" x2="400" y2="2" stroke="#ffe600" stroke-width="3" opacity="0.6" filter="url(#lineGlow)"/>
  <!-- Bottom: blue left, green right -->
  <line x1="0" y1="298" x2="200" y2="298" stroke="#1a8cff" stroke-width="3" opacity="0.6" filter="url(#lineGlow)"/>
  <line x1="200" y1="298" x2="400" y2="298" stroke="#00ff66" stroke-width="3" opacity="0.6" filter="url(#lineGlow)"/>

  <!-- Corner glows -->
  <circle cx="2" cy="2" r="4" fill="#ff1a1a" opacity="0.6" filter="url(#glow)"/>
  <circle cx="398" cy="2" r="4" fill="#ffe600" opacity="0.6" filter="url(#glow)"/>
  <circle cx="2" cy="298" r="4" fill="#1a8cff" opacity="0.6" filter="url(#glow)"/>
  <circle cx="398" cy="298" r="4" fill="#00ff66" opacity="0.6" filter="url(#glow)"/>

  <!-- Snake trail particles -->
  <circle cx="108" cy="150" r="2" fill="#00f0ff" opacity="0.15"/>
  <circle cx="92" cy="148" r="1.5" fill="#00ccff" opacity="0.1"/>
  <circle cx="115" cy="153" r="1" fill="#0099ff" opacity="0.12"/>
  <circle cx="80" cy="155" r="1.8" fill="#6622ff" opacity="0.08"/>

  <!-- Snake body - curved path with gradient colors -->
  <!-- Tail segments (pink/purple) -->
  <rect x="41" y="171" width="16" height="16" rx="3" fill="url(#snakeBody3)" opacity="0.8" filter="url(#glow)"/>
  <rect x="41" y="151" width="16" height="16" rx="3" fill="url(#snakeBody3)" opacity="0.85" filter="url(#glow)"/>
  <rect x="61" y="151" width="16" height="16" rx="3" fill="url(#snakeBody2)" opacity="0.85" filter="url(#glow)"/>
  <rect x="81" y="151" width="16" height="16" rx="3" fill="url(#snakeBody2)" opacity="0.9" filter="url(#glow)"/>
  <rect x="101" y="151" width="16" height="16" rx="3" fill="url(#snakeBody1)" opacity="0.9" filter="url(#glow)"/>
  <rect x="121" y="151" width="16" height="16" rx="3" fill="url(#snakeBody1)" opacity="0.92" filter="url(#glow)"/>
  <rect x="141" y="151" width="16" height="16" rx="3" fill="url(#snakeBody1)" opacity="0.95" filter="url(#glow)"/>
  <!-- Turn up -->
  <rect x="141" y="131" width="16" height="16" rx="3" fill="url(#snakeBody1)" opacity="0.95" filter="url(#glow)"/>
  <rect x="161" y="131" width="16" height="16" rx="3" fill="url(#snakeHead)" opacity="0.95" filter="url(#glow)"/>
  <!-- Head going right -->
  <rect x="181" y="131" width="18" height="18" rx="4" fill="url(#snakeHead)" filter="url(#glowStrong)"/>

  <!-- Snake eyes -->
  <circle cx="192" cy="135" r="2.5" fill="#ffffff" filter="url(#glow)"/>
  <circle cx="192" cy="143" r="2.5" fill="#ffffff" filter="url(#glow)"/>
  <circle cx="193" cy="135" r="1.2" fill="#000000"/>
  <circle cx="193" cy="143" r="1.2" fill="#000000"/>

  <!-- Food (glowing orb) -->
  <circle cx="300" cy="100" r="12" fill="#39ff14" opacity="0.2" filter="url(#foodGlow)"/>
  <circle cx="300" cy="100" r="8" fill="url(#food)" filter="url(#glow)"/>
  <circle cx="298" cy="98" r="3" fill="#ffffff" opacity="0.6"/>
  <!-- Food sparkle ring -->
  <circle cx="312" cy="96" r="1.5" fill="#ffe600" opacity="0.5" filter="url(#glow)"/>
  <circle cx="295" cy="88" r="1.5" fill="#ffe600" opacity="0.4" filter="url(#glow)"/>
  <circle cx="288" cy="100" r="1.5" fill="#ffe600" opacity="0.5" filter="url(#glow)"/>
  <circle cx="295" cy="112" r="1.5" fill="#ffe600" opacity="0.4" filter="url(#glow)"/>
  <circle cx="308" cy="110" r="1.5" fill="#ffe600" opacity="0.5" filter="url(#glow)"/>
  <circle cx="312" cy="104" r="1.5" fill="#ffe600" opacity="0.3" filter="url(#glow)"/>

  <!-- Ambient glow particles -->
  <circle cx="250" cy="200" r="1.5" fill="#00f0ff" opacity="0.15"/>
  <circle cx="330" cy="220" r="1" fill="#ff2d7b" opacity="0.12"/>
  <circle cx="60" cy="80" r="1.5" fill="#39ff14" opacity="0.15"/>
  <circle cx="350" cy="60" r="1" fill="#aa44ff" opacity="0.12"/>
  <circle cx="180" cy="250" r="1.5" fill="#00f0ff" opacity="0.1"/>

  <!-- Score watermark -->
  <text x="200" y="160" fill="#00f0ff" font-family="monospace" font-size="48" font-weight="bold" text-anchor="middle" opacity="0.04">12</text>
</svg>
