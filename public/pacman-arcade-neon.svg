<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0a0a15"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="bigGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="url(#bg)"/>
  
  <!-- Maze lines (decorative) -->
  <g stroke="#2563eb" stroke-width="2" fill="none" opacity="0.4" filter="url(#glow)">
    <rect x="30" y="30" width="340" height="240" rx="8"/>
    <line x1="30" y1="100" x2="120" y2="100"/>
    <line x1="120" y1="100" x2="120" y2="60"/>
    <line x1="280" y1="100" x2="370" y2="100"/>
    <line x1="280" y1="100" x2="280" y2="60"/>
    <line x1="30" y1="200" x2="120" y2="200"/>
    <line x1="120" y1="200" x2="120" y2="240"/>
    <line x1="280" y1="200" x2="370" y2="200"/>
    <line x1="280" y1="200" x2="280" y2="240"/>
    <rect x="150" y="120" width="100" height="40" rx="4"/>
  </g>
  
  <!-- Dots -->
  <g fill="#fbbf24" filter="url(#glow)">
    <circle cx="80" cy="150" r="3"/>
    <circle cx="110" cy="150" r="3"/>
    <circle cx="140" cy="150" r="3"/>
    <circle cx="260" cy="150" r="3"/>
    <circle cx="290" cy="150" r="3"/>
    <circle cx="320" cy="150" r="3"/>
    <!-- Power pellets -->
    <circle cx="55" cy="55" r="6" opacity="0.9"/>
    <circle cx="345" cy="55" r="6" opacity="0.9"/>
    <circle cx="55" cy="245" r="6" opacity="0.9"/>
    <circle cx="345" cy="245" r="6" opacity="0.9"/>
  </g>
  
  <!-- Pac-Man -->
  <g filter="url(#bigGlow)" transform="translate(200, 150)">
    <path d="M0,0 L30,-20 A35,35 0 1,0 30,20 Z" fill="#facc15" transform="translate(-15,0)"/>
    <circle cx="-5" cy="-12" r="3" fill="#000"/>
  </g>
  
  <!-- Ghosts -->
  <g filter="url(#glow)">
    <!-- Red ghost (Blinky) -->
    <g transform="translate(310, 80)">
      <path d="M-15,-10 Q-15,-25 0,-25 Q15,-25 15,-10 L15,10 L10,5 L5,10 L0,5 L-5,10 L-10,5 L-15,10 Z" fill="#ff0000"/>
      <circle cx="-5" cy="-12" r="4" fill="#fff"/>
      <circle cx="5" cy="-12" r="4" fill="#fff"/>
      <circle cx="-4" cy="-12" r="2" fill="#1e3a8a"/>
      <circle cx="4" cy="-12" r="2" fill="#1e3a8a"/>
    </g>
    <!-- Pink ghost (Pinky) -->
    <g transform="translate(80, 80)">
      <path d="M-15,-10 Q-15,-25 0,-25 Q15,-25 15,-10 L15,10 L10,5 L5,10 L0,5 L-5,10 L-10,5 L-15,10 Z" fill="#ffb8ff"/>
      <circle cx="-5" cy="-12" r="4" fill="#fff"/>
      <circle cx="5" cy="-12" r="4" fill="#fff"/>
      <circle cx="-4" cy="-12" r="2" fill="#1e3a8a"/>
      <circle cx="4" cy="-12" r="2" fill="#1e3a8a"/>
    </g>
    <!-- Cyan ghost (Inky) -->
    <g transform="translate(310, 220)">
      <path d="M-15,-10 Q-15,-25 0,-25 Q15,-25 15,-10 L15,10 L10,5 L5,10 L0,5 L-5,10 L-10,5 L-15,10 Z" fill="#00ffff"/>
      <circle cx="-5" cy="-12" r="4" fill="#fff"/>
      <circle cx="5" cy="-12" r="4" fill="#fff"/>
      <circle cx="-4" cy="-12" r="2" fill="#1e3a8a"/>
      <circle cx="4" cy="-12" r="2" fill="#1e3a8a"/>
    </g>
    <!-- Orange ghost (Clyde) -->
    <g transform="translate(80, 220)">
      <path d="M-15,-10 Q-15,-25 0,-25 Q15,-25 15,-10 L15,10 L10,5 L5,10 L0,5 L-5,10 L-10,5 L-15,10 Z" fill="#ffb852"/>
      <circle cx="-5" cy="-12" r="4" fill="#fff"/>
      <circle cx="5" cy="-12" r="4" fill="#fff"/>
      <circle cx="-4" cy="-12" r="2" fill="#1e3a8a"/>
      <circle cx="4" cy="-12" r="2" fill="#1e3a8a"/>
    </g>
  </g>
</svg>
