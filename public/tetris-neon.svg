<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a2e"/>
      <stop offset="100%" style="stop-color:#1a0a3e"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0f0;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#0050ff;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <rect x="0" y="0" width="400" height="300" fill="url(#glow)"/>
  <!-- Grid lines -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="0.5">
    <line x1="120" y1="40" x2="120" y2="260"/><line x1="150" y1="40" x2="150" y2="260"/>
    <line x1="180" y1="40" x2="180" y2="260"/><line x1="210" y1="40" x2="210" y2="260"/>
    <line x1="240" y1="40" x2="240" y2="260"/><line x1="270" y1="40" x2="270" y2="260"/>
    <line x1="120" y1="70" x2="270" y2="70"/><line x1="120" y1="100" x2="270" y2="100"/>
    <line x1="120" y1="130" x2="270" y2="130"/><line x1="120" y1="160" x2="270" y2="160"/>
    <line x1="120" y1="190" x2="270" y2="190"/><line x1="120" y1="220" x2="270" y2="220"/>
  </g>
  <!-- T-piece -->
  <rect x="150" y="70" width="29" height="29" rx="2" fill="#a000f0" opacity="0.9"/>
  <rect x="120" y="100" width="29" height="29" rx="2" fill="#a000f0" opacity="0.9"/>
  <rect x="150" y="100" width="29" height="29" rx="2" fill="#a000f0" opacity="0.9"/>
  <rect x="180" y="100" width="29" height="29" rx="2" fill="#a000f0" opacity="0.9"/>
  <!-- S-piece -->
  <rect x="210" y="100" width="29" height="29" rx="2" fill="#00f000" opacity="0.9"/>
  <rect x="240" y="100" width="29" height="29" rx="2" fill="#00f000" opacity="0.9"/>
  <rect x="180" y="130" width="29" height="29" rx="2" fill="#00f000" opacity="0.9"/>
  <rect x="210" y="130" width="29" height="29" rx="2" fill="#00f000" opacity="0.9"/>
  <!-- I-piece -->
  <rect x="120" y="160" width="29" height="29" rx="2" fill="#00f0f0" opacity="0.9"/>
  <rect x="150" y="160" width="29" height="29" rx="2" fill="#00f0f0" opacity="0.9"/>
  <rect x="180" y="160" width="29" height="29" rx="2" fill="#00f0f0" opacity="0.9"/>
  <rect x="210" y="160" width="29" height="29" rx="2" fill="#00f0f0" opacity="0.9"/>
  <!-- O-piece -->
  <rect x="240" y="160" width="29" height="29" rx="2" fill="#f0f000" opacity="0.9"/>
  <rect x="240" y="190" width="29" height="29" rx="2" fill="#f0f000" opacity="0.9"/>
  <!-- L-piece -->
  <rect x="120" y="190" width="29" height="29" rx="2" fill="#f0a000" opacity="0.9"/>
  <rect x="120" y="220" width="29" height="29" rx="2" fill="#f0a000" opacity="0.9"/>
  <rect x="150" y="220" width="29" height="29" rx="2" fill="#f0a000" opacity="0.9"/>
  <rect x="180" y="220" width="29" height="29" rx="2" fill="#f0a000" opacity="0.9"/>
  <!-- Z-piece falling -->
  <rect x="150" y="130" width="29" height="29" rx="2" fill="#f00000" opacity="0.7"/>
  <rect x="180" y="130" width="29" height="4" rx="1" fill="#f00000" opacity="0.15"/>
  <!-- Block highlights -->
  <rect x="150" y="70" width="29" height="3" rx="1" fill="#fff" opacity="0.25"/>
  <rect x="120" y="100" width="29" height="3" rx="1" fill="#fff" opacity="0.25"/>
  <rect x="120" y="160" width="29" height="3" rx="1" fill="#fff" opacity="0.25"/>
  <rect x="240" y="160" width="29" height="3" rx="1" fill="#fff" opacity="0.25"/>
  <rect x="120" y="190" width="29" height="3" rx="1" fill="#fff" opacity="0.25"/>
  <!-- Glow effects -->
  <circle cx="195" cy="150" r="80" fill="#00f0f0" opacity="0.04"/>
  <circle cx="195" cy="150" r="120" fill="#a000f0" opacity="0.03"/>
</svg>
