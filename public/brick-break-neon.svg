<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a2e"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </linearGradient>
    <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff4444"/>
      <stop offset="100%" stop-color="#aa1111"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff8844"/>
      <stop offset="100%" stop-color="#aa5511"/>
    </linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffcc44"/>
      <stop offset="100%" stop-color="#aa8811"/>
    </linearGradient>
    <linearGradient id="g4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#44ff44"/>
      <stop offset="100%" stop-color="#11aa11"/>
    </linearGradient>
    <linearGradient id="g5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#44aaff"/>
      <stop offset="100%" stop-color="#1155aa"/>
    </linearGradient>
    <linearGradient id="g6" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#aa44ff"/>
      <stop offset="100%" stop-color="#5511aa"/>
    </linearGradient>
    <linearGradient id="paddle" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00ff88"/>
      <stop offset="100%" stop-color="#009955"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="ballGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="url(#bg)"/>
  
  <!-- Grid -->
  <g stroke="rgba(255,255,255,0.03)" stroke-width="0.5">
    <line x1="50" y1="0" x2="50" y2="300"/><line x1="100" y1="0" x2="100" y2="300"/>
    <line x1="150" y1="0" x2="150" y2="300"/><line x1="200" y1="0" x2="200" y2="300"/>
    <line x1="250" y1="0" x2="250" y2="300"/><line x1="300" y1="0" x2="300" y2="300"/>
    <line x1="350" y1="0" x2="350" y2="300"/>
    <line x1="0" y1="50" x2="400" y2="50"/><line x1="0" y1="100" x2="400" y2="100"/>
    <line x1="0" y1="150" x2="400" y2="150"/><line x1="0" y1="200" x2="400" y2="200"/>
    <line x1="0" y1="250" x2="400" y2="250"/>
  </g>
  
  <!-- Brick rows -->
  <g>
    <!-- Row 1 - Red -->
    <rect x="30" y="40" width="42" height="14" rx="2" fill="url(#g1)"/>
    <rect x="76" y="40" width="42" height="14" rx="2" fill="url(#g1)"/>
    <rect x="122" y="40" width="42" height="14" rx="2" fill="url(#g1)"/>
    <rect x="168" y="40" width="42" height="14" rx="2" fill="url(#g1)"/>
    <rect x="214" y="40" width="42" height="14" rx="2" fill="url(#g1)"/>
    <rect x="260" y="40" width="42" height="14" rx="2" fill="url(#g1)"/>
    <rect x="306" y="40" width="42" height="14" rx="2" fill="url(#g1)"/>
    <!-- Row 2 - Orange -->
    <rect x="30" y="58" width="42" height="14" rx="2" fill="url(#g2)"/>
    <rect x="76" y="58" width="42" height="14" rx="2" fill="url(#g2)"/>
    <rect x="122" y="58" width="42" height="14" rx="2" fill="url(#g2)"/>
    <rect x="168" y="58" width="42" height="14" rx="2" fill="#8888aa" stroke="#aaaacc" stroke-width="0.5"/>
    <rect x="214" y="58" width="42" height="14" rx="2" fill="url(#g2)"/>
    <rect x="260" y="58" width="42" height="14" rx="2" fill="url(#g2)"/>
    <rect x="306" y="58" width="42" height="14" rx="2" fill="url(#g2)"/>
    <!-- Row 3 - Yellow -->
    <rect x="30" y="76" width="42" height="14" rx="2" fill="url(#g3)"/>
    <rect x="76" y="76" width="42" height="14" rx="2" fill="url(#g3)"/>
    <rect x="122" y="76" width="42" height="14" rx="2" fill="#ff6600"/>
    <rect x="168" y="76" width="42" height="14" rx="2" fill="url(#g3)"/>
    <rect x="214" y="76" width="42" height="14" rx="2" fill="url(#g3)"/>
    <rect x="260" y="76" width="42" height="14" rx="2" fill="#ffd700"/>
    <rect x="306" y="76" width="42" height="14" rx="2" fill="url(#g3)"/>
    <!-- Row 4 - Green -->
    <rect x="30" y="94" width="42" height="14" rx="2" fill="url(#g4)"/>
    <rect x="76" y="94" width="42" height="14" rx="2" fill="url(#g4)"/>
    <rect x="122" y="94" width="42" height="14" rx="2" fill="url(#g4)"/>
    <rect x="168" y="94" width="42" height="14" rx="2" fill="url(#g4)"/>
    <rect x="214" y="94" width="42" height="14" rx="2" fill="url(#g4)"/>
    <rect x="260" y="94" width="42" height="14" rx="2" fill="url(#g4)"/>
    <rect x="306" y="94" width="42" height="14" rx="2" fill="url(#g4)"/>
    <!-- Row 5 - Blue -->
    <rect x="30" y="112" width="42" height="14" rx="2" fill="url(#g5)"/>
    <rect x="76" y="112" width="42" height="14" rx="2" fill="url(#g5)"/>
    <rect x="122" y="112" width="42" height="14" rx="2" fill="url(#g5)"/>
    <rect x="168" y="112" width="42" height="14" rx="2" fill="url(#g5)"/>
    <rect x="214" y="112" width="42" height="14" rx="2" fill="url(#g5)"/>
    <rect x="260" y="112" width="42" height="14" rx="2" fill="url(#g5)"/>
    <rect x="306" y="112" width="42" height="14" rx="2" fill="url(#g5)"/>
    <!-- Row 6 - Purple -->
    <rect x="30" y="130" width="42" height="14" rx="2" fill="url(#g6)"/>
    <rect x="76" y="130" width="42" height="14" rx="2" fill="url(#g6)"/>
    <rect x="168" y="130" width="42" height="14" rx="2" fill="url(#g6)"/>
    <rect x="260" y="130" width="42" height="14" rx="2" fill="url(#g6)"/>
    <rect x="306" y="130" width="42" height="14" rx="2" fill="url(#g6)"/>
  </g>
  
  <!-- Brick highlights -->
  <g fill="rgba(255,255,255,0.2)">
    <rect x="30" y="40" width="42" height="3" rx="1"/>
    <rect x="76" y="40" width="42" height="3" rx="1"/>
    <rect x="122" y="40" width="42" height="3" rx="1"/>
    <rect x="168" y="40" width="42" height="3" rx="1"/>
    <rect x="214" y="40" width="42" height="3" rx="1"/>
  </g>
  
  <!-- Particle explosion -->
  <g filter="url(#glow)" opacity="0.8">
    <circle cx="143" cy="76" r="3" fill="#ff6600"/>
    <circle cx="148" cy="70" r="2" fill="#ffcc00"/>
    <circle cx="138" cy="72" r="2.5" fill="#ff8800"/>
    <circle cx="150" cy="80" r="1.5" fill="#ff4400"/>
    <circle cx="135" cy="78" r="2" fill="#ffaa00"/>
    <circle cx="145" cy="66" r="1.5" fill="#ffee00"/>
  </g>
  
  <!-- Ball trail -->
  <g filter="url(#ballGlow)">
    <circle cx="195" cy="200" r="3" fill="rgba(0,200,255,0.15)"/>
    <circle cx="190" cy="195" r="3.5" fill="rgba(0,200,255,0.25)"/>
    <circle cx="185" cy="190" r="4" fill="rgba(0,200,255,0.35)"/>
  </g>
  
  <!-- Ball -->
  <g filter="url(#ballGlow)">
    <circle cx="200" cy="205" r="6" fill="#00ccff" opacity="0.3"/>
    <circle cx="200" cy="205" r="5" fill="white"/>
    <circle cx="198" cy="203" r="2" fill="rgba(255,255,255,0.8)"/>
  </g>
  
  <!-- Paddle -->
  <rect x="155" y="260" width="90" height="12" rx="4" fill="url(#paddle)" filter="url(#glow)"/>
  <rect x="163" y="261" width="74" height="3" rx="1" fill="rgba(255,255,255,0.3)"/>
  
  <!-- Power-up falling -->
  <g>
    <rect x="88" y="178" width="24" height="16" rx="4" fill="#ff4444" opacity="0.9"/>
    <text x="100" y="190" text-anchor="middle" fill="white" font-size="10" font-family="monospace" font-weight="bold">↔</text>
    
    <rect x="278" y="155" width="24" height="16" rx="4" fill="#00ff88" opacity="0.9"/>
    <text x="290" y="167" text-anchor="middle" fill="white" font-size="10" font-family="monospace" font-weight="bold">↔</text>
  </g>
  
  <!-- Score text -->
  <text x="200" y="290" text-anchor="middle" fill="#00ff88" font-size="11" font-family="monospace" font-weight="bold" opacity="0.4">BRICK BREAK</text>
</svg>
